name: Redeploy Mission Control Locally

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types:
      - completed

jobs:
  redeploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Run local restart script
        shell: cmd
        run: |
          C:\Users\skill\.openclaw\mission-restart.cmd