# .github/workflows/docker-publish.yml
name: Build, Push & Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: makeouthillx32/mission-control

jobs:
  build-and-deploy:
    runs-on: [self-hosted, windows, x64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load .env
        shell: powershell
        run: |
          Get-Content "C:\Users\skill\.openclaw\.env" | ForEach-Object {
            if ($_ -match '^\s*([^#][^=]+)=(.*)$') {
              echo "$($matches[1].Trim())=$($matches[2].Trim())" >> $env:GITHUB_ENV
            }
          }

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/makeouthillx32/mission-control
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: C:\Users\skill\.openclaw\mission-control
          file: C:\Users\skill\.openclaw\mission-control\Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=http://kong:8000
            NEXT_PUBLIC_SUPABASE_URL_BROWSER=${{ env.NEXT_PUBLIC_SUPABASE_URL_BROWSER }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_AGENT_NAME=${{ env.NEXT_PUBLIC_AGENT_NAME }}
            NEXT_PUBLIC_AGENT_EMOJI=${{ env.NEXT_PUBLIC_AGENT_EMOJI }}
            NEXT_PUBLIC_AGENT_DESCRIPTION=${{ env.NEXT_PUBLIC_AGENT_DESCRIPTION }}
            NEXT_PUBLIC_OWNER_USERNAME=${{ env.NEXT_PUBLIC_OWNER_USERNAME }}
            NEXT_PUBLIC_OWNER_EMAIL=${{ env.NEXT_PUBLIC_OWNER_EMAIL }}
            NEXT_PUBLIC_COMPANY_NAME=${{ env.NEXT_PUBLIC_COMPANY_NAME }}
            NEXT_PUBLIC_APP_TITLE=${{ env.NEXT_PUBLIC_APP_TITLE }}

      - name: Redeploy
        shell: cmd
        run: C:\Users\skill\.openclaw\mission-restart.cmd