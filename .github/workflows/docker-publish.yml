# .github/workflows/docker-publish.yml
name: Build & Push to ghcr.io

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: makeouthillx32/mission-control

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/makeouthillx32/mission-control
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=http://kong:8000
            NEXT_PUBLIC_SUPABASE_URL_BROWSER=${{ secrets.NEXT_PUBLIC_SUPABASE_URL_BROWSER }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_AGENT_NAME=${{ secrets.NEXT_PUBLIC_AGENT_NAME }}
            NEXT_PUBLIC_AGENT_EMOJI=${{ secrets.NEXT_PUBLIC_AGENT_EMOJI }}
            NEXT_PUBLIC_AGENT_DESCRIPTION=${{ secrets.NEXT_PUBLIC_AGENT_DESCRIPTION }}
            NEXT_PUBLIC_OWNER_USERNAME=${{ secrets.NEXT_PUBLIC_OWNER_USERNAME }}
            NEXT_PUBLIC_OWNER_EMAIL=${{ secrets.NEXT_PUBLIC_OWNER_EMAIL }}
            NEXT_PUBLIC_COMPANY_NAME=${{ secrets.NEXT_PUBLIC_COMPANY_NAME }}
            NEXT_PUBLIC_APP_TITLE=${{ secrets.NEXT_PUBLIC_APP_TITLE }}